# Lines ending with `# [hidden]` won't be shown on cheatsheet
# Lines starting with #! are section headings

#!
##! Shell
# Ambxst Core Modules
bindr = SUPER, Super_L, exec, ambxst run launcher # Launch application
bind = SUPER, D, exec, ambxst run dashboard # Toggle dashboard
bind = SUPER, A, exec, ambxst run assistant # AI Assistant
bind = SUPER, V, exec, ambxst run clipboard # Clipboard manager
bind = SUPER, PERIOD, exec, ambxst run emoji # Emoji picker
bind = SUPER, N, exec, ambxst run notes # Notes module
# bind = SUPER, T, exec, ambxst run tmux # Tmux manager
bind = SUPER, COMMA, exec, ambxst run wallpapers # Wallpaper selector

# System Utilities
bind = SUPER SHIFT, C, exec, ambxst run config # Ambxst configuration
bind = SUPER, TAB, exec, ambxst run overview # Window overview
bind = SUPER, ESCAPE, exec, ambxst run powermenu # Power menu
bind = SUPER, S, exec, ambxst run tools # Quick tools
bind = SUPER SHIFT, S, exec, ambxst run screenshot # Screenshot tool
bind = SUPER SHIFT, R, exec, ambxst run screenrecord # Screen recorder
bind = SUPER SHIFT, A, exec, ambxst run lens # Google Lens / OCR
bind = SUPER CTRL ALT, B, exec, ambxst quit # Quit shell

#!
##! Window
bind = SUPER, Q, killactive, # Close window
bind = SUPER, F, fullscreen, 0 # Toggle fullscreen
bind = SUPER, B, togglefloating, # Toggle floating
bind = SUPER, P, pin, # Pin window

# Focus
bind = SUPER, Left, movefocus, l # Focus left
bind = SUPER, Right, movefocus, r # Focus right
bind = SUPER, Up, movefocus, u # Focus up
bind = SUPER, Down, movefocus, d # Focus down
bind = SUPER CTRL, H, movefocus, l # [hidden]
bind = SUPER CTRL, L, movefocus, r # [hidden]
bind = SUPER CTRL, K, movefocus, u # [hidden]
bind = SUPER CTRL, J, movefocus, d # [hidden]

# Move Window
bind = SUPER SHIFT, Left, movewindow, l # Move window left
bind = SUPER SHIFT, Right, movewindow, r # Move window right
bind = SUPER SHIFT, Up, movewindow, u # Move window up
bind = SUPER SHIFT, Down, movewindow, d # Move window down
bind = SUPER SHIFT, H, movewindow, l # [hidden]
bind = SUPER SHIFT, L, movewindow, r # [hidden]
bind = SUPER SHIFT, K, movewindow, u # [hidden]
bind = SUPER SHIFT, J, movewindow, d # [hidden]

# Resize Window
binde = SUPER ALT, Right, resizeactive, 50 0 # Resize right
binde = SUPER ALT, Left, resizeactive, -50 0 # Resize left
binde = SUPER ALT, Up, resizeactive, 0 -50 # Resize up
binde = SUPER ALT, Down, resizeactive, 0 50 # Resize down
binde = SUPER ALT, L, resizeactive, 50 0 # [hidden]
binde = SUPER ALT, H, resizeactive, -50 0 # [hidden]
binde = SUPER ALT, K, resizeactive, 0 -50 # [hidden]
binde = SUPER ALT, J, resizeactive, 0 50 # [hidden]

# Mouse Bindings
bindm = SUPER, mouse:272, movewindow # Move window (Drag)
bindm = SUPER, mouse:273, resizewindow # Resize window (Drag)

#!
##! Workspace
# Navigation
bind = SUPER, 1, workspace, 1 # Workspace 1
bind = SUPER, 2, workspace, 2 # Workspace 2
bind = SUPER, 3, workspace, 3 # Workspace 3
bind = SUPER, 4, workspace, 4 # Workspace 4
bind = SUPER, 5, workspace, 5 # Workspace 5
bind = SUPER, 6, workspace, 6 # Workspace 6
bind = SUPER, 7, workspace, 7 # Workspace 7
bind = SUPER, 8, workspace, 8 # Workspace 8
bind = SUPER, 9, workspace, 9 # Workspace 9
bind = SUPER, 0, workspace, 10 # Workspace 10

# Move to Workspace
bind = SUPER SHIFT, 1, movetoworkspace, 1 # Move to workspace 1
bind = SUPER SHIFT, 2, movetoworkspace, 2 # Move to workspace 2
bind = SUPER SHIFT, 3, movetoworkspace, 3 # Move to workspace 3
bind = SUPER SHIFT, 4, movetoworkspace, 4 # Move to workspace 4
bind = SUPER SHIFT, 5, movetoworkspace, 5 # Move to workspace 5
bind = SUPER SHIFT, 6, movetoworkspace, 6 # Move to workspace 6
bind = SUPER SHIFT, 7, movetoworkspace, 7 # Move to workspace 7
bind = SUPER SHIFT, 8, movetoworkspace, 8 # Move to workspace 8
bind = SUPER SHIFT, 9, movetoworkspace, 9 # Move to workspace 9
bind = SUPER SHIFT, 0, movetoworkspace, 10 # Move to workspace 10

# Sequential & Scroll
# bind = SUPER, Z, workspace, -1 # Previous workspace
bind = SUPER, X, workspace, +1 # Next workspace
bind = SUPER SHIFT, Z, workspace, e-1 # Previous occupied workspace
bind = SUPER SHIFT, X, workspace, e+1 # Next occupied workspace
bind = SUPER, mouse_down, workspace, e-1 # [hidden]
bind = SUPER, mouse_up, workspace, e+1 # [hidden]

# Special Workspace
bind = SUPER SHIFT, V, togglespecialworkspace, # Toggle scratchpad
bind = SUPER ALT, V, movetoworkspace, special # Move to scratchpad

#!
##! Media & Hardware
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 10%+ # Volume up
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 10%- # Volume down
bindle = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle # Mute audio
bindle = , XF86MonBrightnessUp, exec, ambxst brightness +5 # Brightness up
bindle = , XF86MonBrightnessDown, exec, ambxst brightness -5 # Brightness down

bindl = , XF86AudioPlay, exec, playerctl play-pause # Play/Pause
bindl = , XF86AudioNext, exec, playerctl next # Next track
bindl = , XF86AudioPrev, exec, playerctl previous # Previous track

#!
##! Session
bind = SUPER, L, exec, loginctl lock-session # Lock screen
bindl = , switch:Lid Switch, exec, loginctl lock-session # [hidden]
bindl = , switch:on:Lid Switch, exec, axctl monitor set-dpms 0 0 # [hidden]
bindl = , switch:off:Lid Switch, exec, axctl monitor set-dpms 0 1 # [hidden]

#!
##! Apps
bind = SUPER, Return, exec, kitty # Terminal
bind = SUPER, E, exec, GDK_DISABLE=vulkan nautilus --new-window --no-desktop
